# Frontend Application Configuration
spring.application.name=hotel-frontend

# Profile is set during Maven build (via resource filtering)
# This value is replaced by Maven: @active.profile@
spring.profiles.active=@active.profile@

# MySQL Database Configuration
#spring.datasource.url=jdbc:mysql://localhost:3306/hotel2025?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
#spring.datasource.url=jdbc:mysql://HOTEL-ANJANI-SERVER:3306/hotel2025?useSSL=false&serverTimezone=UTC
spring.datasource.url=jdbc:mysql://HOTEL-ANJANI-SERVER:3306/hotel2025?useSSL=false&serverTimezone=UTC
#spring.datasource.url=jdbc:mysql://localhost:3306/hotel2025?useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:2355}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
# Use 'validate' for faster startup (no schema scanning/altering)
# Change to 'update' only when entity schema changes are made
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Lazy initialization - beans are created only when first accessed (faster startup)
spring.main.lazy-initialization=true

# Logging Configuration
logging.file.path=./logs
logging.level.com.frontend=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO

# JavaFX Configuration
javafx.preloader=false

# Server Configuration - bind to all network interfaces (IP + hostname)
server.address=0.0.0.0

# CORS Configuration - allowed origins (comma-separated)
# Use * pattern to allow any origin on local network
cors.allowed-origins=*

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.syntaxHighlight.activated=true